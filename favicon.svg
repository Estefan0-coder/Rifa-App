<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="star-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="64" height="64" rx="14"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Ticket body -->
  <rect x="8" y="13" width="48" height="31" rx="5" fill="white" fill-opacity="0.95"/>

  <!-- Notch left -->
  <circle cx="8" cy="28.5" r="5.5" fill="url(#bg)"/>
  <!-- Notch right -->
  <circle cx="56" cy="28.5" r="5.5" fill="url(#bg)"/>

  <!-- Dashed divider -->
  <line x1="13.5" y1="28.5" x2="50.5" y2="28.5" stroke="#8B5CF6" stroke-width="1.2"
        stroke-dasharray="4 3" stroke-linecap="round" stroke-opacity="0.5"/>

  <!-- Star (upper half of ticket) -->
  <polygon points="32,16 33.8,22.2 40.2,22.2 35,26.1 36.8,32.3 32,28.4 27.2,32.3 29,26.1 23.8,22.2 30.2,22.2"
           fill="url(#star-g)" transform="translate(0,-3.5) scale(0.82) translate(5.8, 4.2)"/>

  <!-- Star centered better -->
  <g transform="translate(32, 21)">
    <polygon points="0,-6.5 1.9,3 8.5,2 3.8,7 6.2,13.5 0,9.5 -6.2,13.5 -3.8,7 -8.5,2 -1.9,3"
             transform="scale(0.72)" fill="url(#star-g)"/>
  </g>

  <!-- Three dots (lower half of ticket) -->
  <circle cx="24" cy="35.5" r="2" fill="#8B5CF6" fill-opacity="0.7"/>
  <circle cx="32" cy="35.5" r="2" fill="#8B5CF6" fill-opacity="0.7"/>
  <circle cx="40" cy="35.5" r="2" fill="#8B5CF6" fill-opacity="0.7"/>

  <!-- Bottom label bar -->
  <rect x="8" y="48" width="48" height="10" rx="3" fill="white" fill-opacity="0.15"/>
  <text x="32" y="55.5" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="5.5" font-weight="700" letter-spacing="0.8" fill="white" fill-opacity="0.85">RIFAPRO</text>
</svg>
